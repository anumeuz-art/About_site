<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <nav class="navbar navbar-expand-lg fixed-top" data-aos="fade-down">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span id="nav-logo">Portfolio</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon">.</span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links"></ul>
                <div id="theme-toggle-container" class="ms-lg-3">
                    <div id="theme-toggle-circle">
                        <i class="fas fa-sun"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-5">
        <div class="text-center mb-5" data-aos="fade-up">
            <h2 class="section-title">Projects</h2>
            <p class="lead text-muted">A collection of my recent work in AI, Python, and Web Development.</p>
        </div>
        <div id="projects-content" class="row g-4 mt-2"></div>
    </main>

    <footer class="bg-dark text-white text-center py-4">
        <div class="container"><p>&copy; 2026 Portfolio. Pure Frontend Version.</p></div>
    </footer>

    <!-- Project Modal -->
    <div class="modal fade" id="projectModal" tabindex="-1" aria-labelledby="projectModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="projectModalLabel">Project Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <img src="" id="modalImage" class="img-fluid w-100 mb-4" alt="" style="height: 350px; object-fit: cover;">
                    <div class="px-4 pb-4">
                        <h3 id="modalTitle" class="fw-bold mb-3" style="color: var(--accent-color);"></h3>
                        <p id="modalBody" class="lead mb-4"></p>
                        <div id="modalLinks" class="d-flex gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
